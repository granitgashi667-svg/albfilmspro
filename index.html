<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlbFilms24</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="sidebar">
  <div class="logo">AF</div>
  <i class="fas fa-home"></i>
  <i class="fas fa-film"></i>
  <i class="fas fa-tv"></i>
  <i class="fas fa-star"></i>
</div>

<div class="main">

<div class="header">
  <h1 class="brand">AlbFilms<span>24</span></h1>
  <input id="searchInput" placeholder="Kërko filma..." />
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>AlbFilms24</h1>
    <p>Destinacioni yt për filma dhe seriale HD. Eksploro dhe shijo pa kufi!</p>
    <button onclick="scrollToContent()">Start Exploring</button>
  </div>
</div>

<!-- GENRES -->
<div class="genres">
<button onclick="loadGenre(28)">Action</button>
<button onclick="loadGenre(35)">Comedy</button>
<button onclick="loadGenre(18)">Drama</button>
<button onclick="loadGenre(27)">Horror</button>
</div>

<h2 class="section-title">Trending</h2>
<div class="row" id="trendingRow"></div>

<h2 class="section-title">Latest</h2>
<div class="row" id="customRow"></div>

</div>

<script src="main.js"></script>
</body>
</html>
