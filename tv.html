<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AlbFilms24 - TV Series Episodes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; background-size: cover; background-attachment: fixed; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: -1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .nav-bar { display: flex; justify-content: flex-start; margin-bottom: 30px; gap: 15px; align-items: center; flex-wrap: wrap; }
        .back-btn { background: rgba(30, 30, 40, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-weight: 500; transition: 0.2s; }
        .back-btn:hover { background: #e50914; border-color: #e50914; transform: translateX(-3px); }
        .servers {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .server-btn {
            background: #1e2026;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ccc;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            font-size: 14px;
        }
        .server-btn.active, .server-btn:hover {
            background: #e50914;
            color: white;
        }
        .series-hero { display: flex; gap: 40px; flex-wrap: wrap; background: rgba(20, 20, 30, 0.7); backdrop-filter: blur(12px); border-radius: 28px; padding: 30px; margin-bottom: 40px; border-left: 5px solid #e50914; }
        .poster img { width: 260px; border-radius: 20px; cursor: pointer; }
        .title { font-size: 40px; font-weight: 800; margin-bottom: 16px; background: linear-gradient(135deg, #fff, #e50914); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .meta { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 24px; }
        .meta span { background: #1e2026; padding: 6px 16px; border-radius: 40px; }
        .season-selector { display: flex; flex-wrap: wrap; gap: 12px; margin: 30px 0 20px; }
        .season-btn { background: #1e2026; border: none; padding: 10px 24px; border-radius: 40px; color: #ccc; cursor: pointer; }
        .season-btn.active { background: #e50914; color: white; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin: 20px 0; }
        .episode-card { background: #1a1c24; border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .episode-card:hover { background: #e50914; }
        .episode-number { font-weight: 700; background: #0a0a0f; padding: 4px 12px; border-radius: 30px; }
        .episode-title { flex: 1; margin-left: 15px; font-weight: 500; }
        .player-wrapper { margin-top: 30px; border-radius: 24px; overflow: hidden; background: #000; }
        iframe { width: 100%; aspect-ratio: 16 / 9; border: none; }
        .episode-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 25px 0 20px;
            flex-wrap: wrap;
        }
        .ep-pagination-btn {
            background: #1e2026;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: #ccc;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .ep-pagination-btn:hover:not(:disabled) { background: #e50914; color: white; }
        .ep-pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-numbers { display: flex; gap: 8px; align-items: center; }
        .page-num { background: #1e2026; border: none; width: 36px; height: 36px; border-radius: 50%; color: #ccc; cursor: pointer; font-weight: 500; }
        .page-num.active { background: #e50914; color: white; }
        .page-num:hover:not(.active) { background: #333; }
        @media (max-width: 700px) {
            .poster img { width: 160px; }
            .title { font-size: 28px; }
            .series-hero { padding: 20px; gap: 20px; }
            .episodes-grid { grid-template-columns: 1fr; }
            .server-btn { padding: 6px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back to Home</button>
    </div>
    <div id="info" class="series-hero"></div>
    <div id="seasonsContainer" class="season-selector"></div>
    <div id="episodesContainer" class="episodes-grid"></div>
    <div id="episodePagination" class="episode-pagination"></div>
    <div class="servers" id="serverList"></div>
    <div id="playerContainer" class="player-wrapper" style="display: none;">
        <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const tvId = params.get('id');
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP = 'https://image.tmdb.org/t/p/original';
    let tvData = null;
    let currentSeason = 1;
    let currentEpisodePage = 1;
    const EPISODES_PER_PAGE = 10;
    let currentEpisodesList = [];
    let currentServer = 'vidsrc';
    let lastSelectedEpisode = { season: null, episode: null };

    // ============ 6 SERVERË (mund të ndryshosh URL-të sipas nevojës) ============
    const servers = {
        vidsrc: {
            name: 'Server 1 (VidSrc)',
            getUrl: (id, season, episode) => `https://vidsrcme.ru/embed/tv/${id}/${season}/${episode}`
        },
        multiembed: {
            name: 'Server 2 (AirPlay)',
            getUrl: (id, season, episode) => `https://multiembed.mov/?video_id=${id}&tmdb=1&tv=1&season=${season}&episode=${episode}`
        },
        embed2: {
            name: 'Server 3 (2Embed)',
            getUrl: (id, season, episode) => `https://www.2embed.cc/embedtv/${id}&season=${season}&episode=${episode}`
        },
        vkng: {
            name: 'Server 4 (Vkng)',
            getUrl: (id, season, episode) => `https://vkng.com/embed/tv/${id}/${season}/${episode}`   // Zëvendëso URL-në nëse di të saktën
        },
        xps: {
            name: 'Server 5 (Xps)',
            getUrl: (id, season, episode) => `https://xps.tv/embed/${id}/${season}/${episode}`           // Zëvendëso URL-në
        },
        vsrc: {
            name: 'Server 6 (VSrc)',
            getUrl: (id, season, episode) => `https://vsrc.xyz/embed/tv/${id}/${season}/${episode}`       // Zëvendëso URL-në
        }
    };

    function loadVideo(season, episode, skipSave = false) {
        if (!skipSave) {
            lastSelectedEpisode = { season, episode };
        }
        const server = servers[currentServer];
        if (server && tvId) {
            const embedUrl = server.getUrl(tvId, season, episode);
            const player = document.getElementById('player');
            player.src = embedUrl;
            const playerContainer = document.getElementById('playerContainer');
            playerContainer.style.display = 'block';
            playerContainer.scrollIntoView({ behavior: 'smooth' });
        } else {
            alert('Invalid server or ID');
        }
    }

    // Funksioni për të rifreskuar episodin aktual me serverin e ri
    function reloadCurrentEpisode() {
        if (lastSelectedEpisode.season !== null && lastSelectedEpisode.episode !== null) {
            loadVideo(lastSelectedEpisode.season, lastSelectedEpisode.episode, true);
        } else {
            // Nëse nuk ka episod të zgjedhur, bëj një njoftim të butë
            const msg = document.createElement('div');
            msg.textContent = 'Select an episode first, then change server.';
            msg.style.position = 'fixed';
            msg.style.bottom = '20px';
            msg.style.right = '20px';
            msg.style.backgroundColor = '#e50914';
            msg.style.padding = '10px 15px';
            msg.style.borderRadius = '30px';
            msg.style.zIndex = '9999';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }
    }

    async function loadTVDetails() {
        if (!tvId) return;
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}&language=en-US`);
        tvData = await res.json();
        const backdrop = tvData.backdrop_path ? BACKDROP + tvData.backdrop_path : '';
        if (backdrop) document.body.style.backgroundImage = `url('${backdrop}')`;
        document.getElementById('info').innerHTML = `
            <div class="poster"><img src="${tvData.poster_path ? IMG + tvData.poster_path : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${tvData.name}"></div>
            <div class="details">
                <div class="title">${tvData.name}</div>
                <div class="meta"><span>📅 ${tvData.first_air_date?.split('-')[0] || 'N/A'}</span><span>⭐ ${tvData.vote_average?.toFixed(1)}/10</span><span>🎬 ${tvData.number_of_seasons} Seasons</span></div>
                <div class="overview">${tvData.overview || 'No description.'}</div>
            </div>
        `;
        loadSeasons();
        // Create server buttons
        const serverContainer = document.getElementById('serverList');
        serverContainer.innerHTML = '';
        Object.keys(servers).forEach(key => {
            const btn = document.createElement('button');
            btn.textContent = servers[key].name;
            btn.className = `server-btn ${key === currentServer ? 'active' : ''}`;
            btn.onclick = () => {
                currentServer = key;
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Reload current episode automatically if any
                reloadCurrentEpisode();
            };
            serverContainer.appendChild(btn);
        });
    }

    function loadSeasons() {
        const seasonsDiv = document.getElementById('seasonsContainer');
        seasonsDiv.innerHTML = '';
        const seasons = tvData.seasons || [];
        seasons.forEach(season => {
            if (season.season_number === 0) return;
            const btn = document.createElement('button');
            btn.textContent = `Season ${season.season_number}`;
            btn.className = 'season-btn';
            if (currentSeason === season.season_number) btn.classList.add('active');
            btn.onclick = () => {
                currentSeason = season.season_number;
                document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentEpisodePage = 1;
                loadEpisodes(currentSeason);
            };
            seasonsDiv.appendChild(btn);
        });
        if (seasons.length) loadEpisodes(currentSeason);
    }

    async function loadEpisodes(seasonNum) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNum}?api_key=${API_KEY}&language=en-US`);
        const seasonData = await res.json();
        currentEpisodesList = seasonData.episodes || [];
        currentEpisodePage = 1;
        renderEpisodes();
    }

    function renderEpisodes() {
        const start = (currentEpisodePage - 1) * EPISODES_PER_PAGE;
        const end = start + EPISODES_PER_PAGE;
        const pageEpisodes = currentEpisodesList.slice(start, end);
        const episodesDiv = document.getElementById('episodesContainer');
        episodesDiv.innerHTML = '';
        pageEpisodes.forEach(ep => {
            const card = document.createElement('div');
            card.className = 'episode-card';
            card.innerHTML = `
                <span class="episode-number">E${ep.episode_number}</span>
                <span class="episode-title">${ep.name}</span>
                <i class="fas fa-play-circle"></i>
            `;
            card.onclick = () => loadVideo(currentSeason, ep.episode_number);
            episodesDiv.appendChild(card);
        });
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(currentEpisodesList.length / EPISODES_PER_PAGE);
        const paginationDiv = document.getElementById('episodePagination');
        paginationDiv.innerHTML = '';
        if (totalPages <= 1) return;
        const prevBtn = document.createElement('button');
        prevBtn.className = 'ep-pagination-btn';
        prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i> Previous';
        prevBtn.disabled = currentEpisodePage === 1;
        prevBtn.onclick = () => { if (currentEpisodePage > 1) { currentEpisodePage--; renderEpisodes(); } };
        paginationDiv.appendChild(prevBtn);
        const pageNumbersDiv = document.createElement('div');
        pageNumbersDiv.className = 'page-numbers';
        let startPage = Math.max(1, currentEpisodePage - 2);
        let endPage = Math.min(totalPages, currentEpisodePage + 2);
        if (endPage - startPage < 4) {
            startPage = Math.max(1, endPage - 4);
            endPage = Math.min(totalPages, startPage + 4);
        }
        for (let i = startPage; i <= endPage; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.textContent = i;
            pageBtn.className = `page-num ${i === currentEpisodePage ? 'active' : ''}`;
            pageBtn.onclick = () => { currentEpisodePage = i; renderEpisodes(); };
            pageNumbersDiv.appendChild(pageBtn);
        }
        paginationDiv.appendChild(pageNumbersDiv);
        const nextBtn = document.createElement('button');
        nextBtn.className = 'ep-pagination-btn';
        nextBtn.innerHTML = 'Next <i class="fas fa-chevron-right"></i>';
        nextBtn.disabled = currentEpisodePage === totalPages;
        nextBtn.onclick = () => { if (currentEpisodePage < totalPages) { currentEpisodePage++; renderEpisodes(); } };
        paginationDiv.appendChild(nextBtn);
    }

    loadTVDetails();
</script>
</body>
</html>
