<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - TV Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .nav-bar { display: flex; justify-content: flex-start; margin-bottom: 30px; }
        .back-btn { background: rgba(30,30,40,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer; font-weight: 500; transition: 0.2s; display: inline-flex; align-items: center; gap: 10px; }
        .back-btn:hover { background: #e50914; transform: translateX(-3px); }
        .series-hero { display: flex; gap: 30px; flex-wrap: wrap; background: rgba(20,20,30,0.7); backdrop-filter: blur(12px); border-radius: 28px; padding: 25px; margin-bottom: 30px; border-left: 5px solid #e50914; }
        .poster img { width: 240px; border-radius: 20px; box-shadow: 0 15px 25px -8px rgba(0,0,0,0.5); }
        .details { flex: 1; }
        .title { font-size: 36px; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, #fff, #e50914); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .meta { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; font-size: 14px; }
        .meta span { background: #1e2026; padding: 5px 14px; border-radius: 40px; display: inline-flex; align-items: center; gap: 6px; }
        .overview { margin-bottom: 20px; line-height: 1.5; color: #ddd; font-size: 15px; }
        .season-selector { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0 15px; }
        .season-btn { background: #1e2026; border: none; padding: 8px 20px; border-radius: 40px; color: #ccc; cursor: pointer; transition: 0.2s; }
        .season-btn.active, .season-btn:hover { background: #e50914; color: white; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin: 15px 0 30px; }
        .episode-card { background: #1a1c24; border-radius: 14px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .episode-card:hover { background: #e50914; transform: scale(1.01); }
        .episode-number { font-weight: 700; background: #0a0a0f; padding: 4px 10px; border-radius: 30px; font-size: 13px; }
        .episode-title { flex: 1; margin-left: 12px; font-weight: 500; font-size: 14px; }
        .player-wrapper { margin-top: 20px; border-radius: 20px; overflow: hidden; background: #000; }
        iframe { width: 100%; aspect-ratio: 16 / 9; border: none; display: block; }
        @media (max-width: 700px) {
            .poster img { width: 140px; }
            .title { font-size: 24px; }
            .series-hero { padding: 15px; gap: 15px; }
            .episodes-grid { grid-template-columns: 1fr; }
        }
    </style>

<body>
<div class="container">
    <div class="nav-bar">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    </div>
    <div id="info" class="series-hero"></div>
    <div id="seasonsContainer" class="season-selector"></div>
    <div id="episodesContainer" class="episodes-grid"></div>
    <div id="playerContainer" class="player-wrapper" style="display: none;">
        <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
</div>
<button id="scrollToTopBtn" class="scroll-top-btn"><i class="fas fa-arrow-up"></i></button>

<script>
    const params = new URLSearchParams(location.search);
    const tvId = params.get('id');
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP = 'https://image.tmdb.org/t/p/original';
    let tvData = null;
    let currentSeason = 1;

    async function loadTVDetails() {
        if (!tvId) { document.getElementById('info').innerHTML = '<div>Invalid ID</div>'; return; }
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}&language=en-US`);
            tvData = await res.json();
            const backdrop = tvData.backdrop_path ? BACKDROP + tvData.backdrop_path : '';
            if (backdrop) document.body.style.backgroundImage = `url('${backdrop}')`;
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundAttachment = 'fixed';
            document.getElementById('info').innerHTML = `
                <div class="poster"><img src="${tvData.poster_path ? IMG+tvData.poster_path : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${tvData.name}"></div>
                <div class="details">
                    <div class="title">${tvData.name}</div>
                    <div class="meta">
                        <span><i class="fas fa-calendar-alt"></i> ${tvData.first_air_date?.split('-')[0] || 'N/A'}</span>
                        <span><i class="fas fa-star"></i> ${tvData.vote_average?.toFixed(1)}/10</span>
                        <span><i class="fas fa-tv"></i> ${tvData.number_of_seasons} Seasons</span>
                    </div>
                    <div class="overview">${tvData.overview || 'No description.'}</div>
                </div>
            `;
            loadSeasons();
        } catch(e) { console.error(e); document.getElementById('info').innerHTML = '<div>Error</div>'; }
    }

    function loadSeasons() {
        const seasonsDiv = document.getElementById('seasonsContainer');
        seasonsDiv.innerHTML = '';
        const seasons = tvData.seasons || [];
        seasons.forEach(season => {
            if (season.season_number === 0) return;
            const btn = document.createElement('button');
            btn.textContent = `Season ${season.season_number}`;
            btn.className = 'season-btn';
            if (currentSeason === season.season_number) btn.classList.add('active');
            btn.onclick = () => {
                currentSeason = season.season_number;
                document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadEpisodes(season.season_number);
            };
            seasonsDiv.appendChild(btn);
        });
        if (seasons.length > 0) {
            const first = seasons.find(s => s.season_number > 0)?.season_number || 1;
            currentSeason = first;
            loadEpisodes(currentSeason);
        }
    }

    async function loadEpisodes(seasonNum) {
        const epsDiv = document.getElementById('episodesContainer');
        epsDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px;">Loading episodes...</div>';
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNum}?api_key=${API_KEY}&language=en-US`);
            const seasonData = await res.json();
            const episodes = seasonData.episodes || [];
            epsDiv.innerHTML = '';
            episodes.forEach(ep => {
                const card = document.createElement('div');
                card.className = 'episode-card';
                card.innerHTML = `<span class="episode-number">E${ep.episode_number}</span><span class="episode-title">${ep.name}</span><i class="fas fa-play-circle"></i>`;
                card.onclick = () => playEpisode(seasonNum, ep.episode_number);
                epsDiv.appendChild(card);
            });
        } catch(e) { console.error(e); epsDiv.innerHTML = '<div>Failed to load episodes</div>'; }
    }

    function playEpisode(seasonNum, episodeNum) {
        const playerContainer = document.getElementById('playerContainer');
        const player = document.getElementById('player');
        player.src = `https://vidsrcme.ru/embed/tv/${tvId}/${seasonNum}/${episodeNum}`;
        playerContainer.style.display = 'block';
        playerContainer.scrollIntoView({ behavior: 'smooth' });
        // Continue watching
        let continueWatching = JSON.parse(localStorage.getItem('alb_continueWatching')) || [];
        const existing = continueWatching.find(c => c.id == tvId && c.type === 'tv');
        const item = { id: tvId, type: 'tv', title: tvData.name, poster: tvData.poster_path, timestamp: Date.now(), season: seasonNum, episode: episodeNum };
        if (existing) { existing.timestamp = Date.now(); existing.season = seasonNum; existing.episode = episodeNum; }
        else { continueWatching.unshift(item); if (continueWatching.length > 20) continueWatching.pop(); }
        localStorage.setItem('alb_continueWatching', JSON.stringify(continueWatching));
    }

    const scrollBtn = document.getElementById('scrollToTopBtn');
    window.addEventListener('scroll', () => { scrollBtn.style.display = window.scrollY > 300 ? 'block' : 'none'; });
    scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    loadTVDetails();
</script>
</body>
</html>
