<div class="main">
    <div class="page-header">
        <h1>TV SHOWS</h1>

            <input type="text" id="searchTV" placeholder="Search TV shows...">

<div id="toast" class="toast"></div>
<button id="scrollToTopBtn" class="scroll-top-btn"><i class="fas fa-arrow-up"></i></button>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const BASE = 'https://api.themoviedb.org/3';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    let currentGenre = 10768;
    let currentPage = 1;
    let totalPages = 1;
    let currentSearch = '';
    let currentUser = null;

    let favorites = JSON.parse(localStorage.getItem('alb_favorites')) || [];
    let watchlist = JSON.parse(localStorage.getItem('alb_watchlist')) || [];

    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function isFavorite(id, type) { return favorites.some(f => f.id == id && f.type === type); }
    function isWatchlist(id, type) { return watchlist.some(w => w.id == id && w.type === type); }
    function updateIcons(id, type) { /* i njëjtë si në main.js */ }
    function toggleFavorite(id,type,title,poster) { /* i njëjtë */ }
    function toggleWatchlist(id,type,title,poster) { /* i njëjtë */ }

    function createCard(show) {
        const card = document.createElement('div');
        card.className = 'tv-card';
        const id = show.id, type = 'tv', title = show.name;
        const year = (show.first_air_date || '').split('-')[0] || 'N/A';
        const rating = show.vote_average ? show.vote_average.toFixed(1) : '?';
        const poster = show.poster_path || '';
        const isFav = isFavorite(id, type);
        const isWatch = isWatchlist(id, type);
        card.innerHTML = `
            <div class="card-icons">
                <div class="favorite-btn" data-id="${id}" data-type="${type}" data-title="${title.replace(/'/g,"\\'")}" data-poster="${poster}"><i class="${isFav?'fas':'far'} fa-heart"></i></div>
                <div class="watchlater-btn" data-id="${id}" data-type="${type}" data-title="${title.replace(/'/g,"\\'")}" data-poster="${poster}"><i class="${isWatch?'fas':'far'} fa-clock"></i></div>
            </div>
            <img class="poster" src="${poster ? IMG+poster : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${title}" loading="lazy">
            <div class="card-info"><h4>${title}</h4><p>${year} ⭐ ${rating}</p></div>
        `;
        card.addEventListener('click', (e) => { if(!e.target.closest('.favorite-btn') && !e.target.closest('.watchlater-btn')) window.location.href = `tv.html?id=${id}`; });
        const favBtn = card.querySelector('.favorite-btn');
        const watchBtn = card.querySelector('.watchlater-btn');
        favBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(id, type, title, poster); });
        watchBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleWatchlist(id, type, title, poster); });
        return card;
    }

    async function loadTopRatedTv(page = 1, containerId, pagId) {
        const grid = document.getElementById(containerId);
        const pag = document.getElementById(pagId);
        if (!grid) return;
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;">Loading 100 Greatest TV Shows...</div>';
        try {
            const res = await fetch(`${BASE}/tv/top_rated?api_key=${API_KEY}&language=en-US&page=${page}`);
            const data = await res.json();
            const totalPages = Math.min(data.total_pages, 5);
            grid.innerHTML = '';
            data.results.forEach(show => grid.appendChild(createCard(show)));
            if (pag) {
                pag.innerHTML = '';
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.className = `page-btn ${i === page ? 'active' : ''}`;
                    btn.onclick = () => loadTopRatedTv(i, containerId, pagId);
                    pag.appendChild(btn);
                }
            }
        } catch(e) { console.error(e); grid.innerHTML = '<div>Error</div>'; }
    }

    async function loadTVShows(page = 1, genre = currentGenre, search = '') {
        const container = document.getElementById('regularContent');
        container.innerHTML = '<div style="text-align:center;padding:40px;">Loading...</div>';
        let url = (search && search.length >= 3) ? `${BASE}/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(search)}&page=${page}` : `${BASE}/discover/tv?api_key=${API_KEY}&with_genres=${genre}&sort_by=popularity.desc&page=${page}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            totalPages = Math.min(data.total_pages, 5);
            let html = '<div class="section-header"><h2 class="section-title">More TV Shows</h2></div><div class="tv-grid" id="dynamicTvGrid"></div><div class="pagination-controls" id="dynamicTvPagination"></div>';
            container.innerHTML = html;
            const grid = document.getElementById('dynamicTvGrid');
            const pagDiv = document.getElementById('dynamicTvPagination');
            data.results.forEach(show => grid.appendChild(createCard(show)));
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = `page-btn ${i === page ? 'active' : ''}`;
                btn.onclick = () => loadTVShows(i, genre, search);
                pagDiv.appendChild(btn);
            }
        } catch(e) { console.error(e); container.innerHTML = '<div>Error</div>'; }
    }

    document.getElementById('searchTV').addEventListener('input', (e) => { currentSearch = e.target.value; if (currentSearch.length >= 3) loadTVShows(1, currentGenre, currentSearch); else if (currentSearch.length === 0) loadTVShows(1, currentGenre, ''); });
    document.querySelectorAll('.genre-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentGenre = parseInt(btn.dataset.genre); currentSearch = ''; document.getElementById('searchTV').value = ''; loadTVShows(1, currentGenre, ''); }; });
    document.getElementById('userIconSidebar').onclick = () => showToast('Login via main page');
    const scrollBtn = document.getElementById('scrollToTopBtn');
    window.addEventListener('scroll', () => { scrollBtn.style.display = window.scrollY > 300 ? 'block' : 'none'; });
    scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

    loadTopRatedTv(1, 'topTvGrid', 'topTvPagination');
    loadTVShows(1, 10768, '');
</script>
</body>
