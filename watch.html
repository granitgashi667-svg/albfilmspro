<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Movie</title>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:#fff;
    font-family:Arial, sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
    text-align:center;
}

h2{
    margin-bottom:10px;
}

iframe{
    width:100%;
    height:520px;
    border:none;
    border-radius:12px;
    background:#000;
}

.servers{
    margin:15px 0;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.server-btn{
    padding:10px 15px;
    background:#222;
    border:1px solid #444;
    color:#fff;
    cursor:pointer;
    border-radius:8px;
    transition:0.2s;
}

.server-btn:hover{
    background:#333;
}

.server-btn.active{
    background:#e50914;
    border-color:#e50914;
}

.back{
    display:inline-block;
    margin-top:15px;
    color:#e50914;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <h2 id="title">Loading...</h2>

    <div class="servers" id="servers"></div>

    <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>

    <br>
    <a href="javascript:history.back()" class="back">← Kthehu</a>
</div>

<script>
// ================= GET MOVIE ID =================
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// ================= LOAD MOVIE FROM MAIN.JS =================
let movie = null;

// marrim nga global scope (main.js)
if (window.opener && window.opener.customMovies) {
    movie = window.opener.customMovies.find(m => m.id === id);
}

if (!movie && window.parent && window.parent.customMovies) {
    movie = window.parent.customMovies.find(m => m.id === id);
}

// fallback (nëse s’gjendet)
if (!movie) {
    document.getElementById("title").innerText = "Film nuk u gjet!";
    throw new Error("Movie not found");
}

// ================= TITLE =================
document.getElementById("title").innerText = movie.title;

// ================= ELEMENTS =================
const serversDiv = document.getElementById("servers");
const player = document.getElementById("player");

// ================= LOAD SERVER =================
function loadServer(url, btn){

    if (!url) return;

    player.src = url;

    document.querySelectorAll(".server-btn").forEach(b=>{
        b.classList.remove("active");
    });

    btn.classList.add("active");
}

// ================= CREATE SERVER BUTTONS =================
movie.servers.forEach((server, index)=>{

    const btn = document.createElement("button");
    btn.className = "server-btn";
    btn.innerText = server.name;

    btn.onclick = () => loadServer(server.url, btn);

    serversDiv.appendChild(btn);

    // auto load first server
    if(index === 0){
        setTimeout(()=>btn.click(), 200);
    }
});

</script>

</body>
</html>
